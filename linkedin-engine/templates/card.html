<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
{{FONT_CSS}}
<style>
  :root{
    --cream:#F1ECDF; --paper:#FBF8EF; --ink:#14130F;
    --rust:#C04B1A; --leaf:#7CA37E; --muted:#7a7565;
  }
  *{margin:0;padding:0;box-sizing:border-box;}
  html,body{width:1200px;height:1200px;}
  body{
    background:var(--cream); color:var(--ink);
    font-family:'Inter',sans-serif; position:relative; overflow:hidden;
  }
  .grid{
    position:absolute; inset:0;
    background-image:linear-gradient(#14131008 1px,transparent 1px),linear-gradient(90deg,#14131008 1px,transparent 1px);
    background-size:60px 60px;
    -webkit-mask-image:radial-gradient(circle at 50% 42%,#000 0%,transparent 80%);
  }
  .wrap{position:absolute; inset:0; padding:92px 96px; display:flex; flex-direction:column;}
  .top{display:flex; align-items:center; justify-content:space-between;}
  .eyebrow{
    font-family:'Inter'; font-weight:700; font-size:26px; letter-spacing:.24em;
    text-transform:uppercase; color:var(--rust);
    display:flex; align-items:center; gap:16px;
  }
  .eyebrow .dot{width:16px;height:16px;background:var(--rust);display:inline-block;}
  .kicker{font-weight:600; font-size:22px; letter-spacing:.18em; text-transform:uppercase; color:var(--muted);}

  .mid{flex:1; display:flex; flex-direction:column; justify-content:center;}

  /* HEADLINE mode */
  .headline{
    font-family:'Fraunces',serif; font-weight:600; color:var(--ink);
    font-size:108px; line-height:1.0; letter-spacing:-0.02em;
  }
  .headline .accent{font-style:italic; color:var(--rust);}

  /* STAT mode */
  .stat{
    font-family:'Fraunces',serif; font-weight:700; letter-spacing:-0.03em; color:var(--ink);
    font-size:340px; line-height:.86;
  }
  .stat .unit{font-size:150px; color:var(--rust); letter-spacing:-0.01em;}

  /* QUOTE mode */
  .mark{font-family:'Fraunces',serif; font-weight:700; font-size:200px; line-height:.6; color:var(--rust); height:120px;}
  .quote{
    font-family:'Fraunces',serif; font-style:italic; font-weight:500; color:var(--ink);
    font-size:90px; line-height:1.12; letter-spacing:-0.01em; max-width:1000px;
  }

  .subline{
    margin-top:46px; font-size:36px; line-height:1.42; color:#403d33;
    max-width:960px; font-weight:400;
  }
  .subline b{font-weight:700; color:var(--ink);}

  .foot{display:flex; align-items:center; justify-content:space-between; padding-top:30px; border-top:2px solid #14131022;}
  .foot .l{font-weight:600; font-size:24px; letter-spacing:.16em; text-transform:uppercase; color:var(--muted);}
  .foot .r{font-weight:500; font-size:26px; color:var(--muted); display:flex; align-items:center; gap:14px;}
  .foot .r .sq{width:13px;height:13px;background:var(--ink);display:inline-block;}
</style>
</head>
<body>
  <div class="grid"></div>
  <div class="wrap">
    <div class="top">
      <div class="eyebrow"><span class="dot"></span>{{EYEBROW}}</div>
      <div class="kicker">{{KICKER}}</div>
    </div>
    <div class="mid">
      {{BODY_BLOCK}}
    </div>
    <div class="foot">
      <div class="l">{{FOOT_L}}</div>
      <div class="r">{{FOOT_R}}</div>
    </div>
  </div>
</body>
</html>
